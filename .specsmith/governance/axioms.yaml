content: "# Epistemic Axioms — oea-framework-paper\n\nThis document defines the five\
  \ Applied Epistemic Engineering (AEE) axioms as they apply\nto oea-framework-paper.\
  \ These axioms govern how beliefs (requirements, decisions, hypotheses)\nare framed,\
  \ challenged, and reconstructed in this project.\n\nSee the AEE primer: https://specsmith.readthedocs.io/en/stable/aee-primer/\n\
  \n---\n\n## Axiom 1: Observability\n\nEvery belief artifact in oea-framework-paper\
  \ must be fully inspectable. Hidden assumptions\nare a stop condition (Hard Rule\
  \ H13).\n\n**In practice:**\n- Every REQ-XXX entry must have an explicit `**Platform:**`\
  \ or `**Boundary:**` field\n- Technology decisions must declare what alternatives\
  \ were considered and rejected\n- All epistemic boundaries must be stated before\
  \ a belief is ACCEPTED\n\n**Enforcement:** `specsmith stress-test` flags missing\
  \ boundaries.\n\n---\n\n## Axiom 2: Falsifiability\n\nEvery accepted belief in oea-framework-paper\
  \ must have at least one test or experimental\nresult that could potentially disprove\
  \ it. Unchallenged claims are not engineering artifacts.\n\n**In practice:**\n-\
  \ Every REQ-XXX with status ACCEPTED must have a corresponding TEST-XXX in TESTS.md\n\
  - Tests must be designed to falsify, not merely confirm\n- Passing tests elevate\
  \ confidence; gaps reduce it\n\n**Enforcement:** `specsmith epistemic-audit` detects\
  \ untested accepted requirements.\n\n---\n\n## Axiom 3: Irreducibility\n\nBeliefs\
  \ must be decomposed to their atomic primitives. Compound claims that bundle\nmultiple\
  \ independently falsifiable sub-claims into a single artifact often hide Logic Knots.\n\
  \n**In practice:**\n- Requirements with more than 3 propositions should be split\n\
  - Claims joined by \"and\" that cover different subjects should be separate requirements\n\
  - Each requirement should be independently verifiable\n\n**Enforcement:** `specsmith\
  \ stress-test` detects compound claim patterns.\n\n---\n\n## Axiom 4: Reconstructability\n\
  \nEvery failed belief artifact can be reconstructed into a new belief that satisfies\n\
  Axioms 1 and 2. Recovery is always possible — scope may need to narrow.\n\n**In\
  \ practice:**\n- Failure modes from stress-testing are recovery opportunities, not\
  \ failures\n- Recovery proposals from `RecoveryOperator` must be reviewed and approved\
  \ before applying\n- Deprecated beliefs are preserved in the ledger — never deleted\n\
  - A reconstructed belief is marked RECONSTRUCTED after human review\n\n**Enforcement:**\
  \ `specsmith epistemic-audit` emits recovery proposals for all failure modes.\n\n\
  ---\n\n## Axiom 5: Convergence\n\nSystematic application of the Stress-Test (S)\
  \ and Recovery (R) operators on oea-framework-paper's\nbelief system will converge\
  \ to an Equilibrium Point E where S(G) yields no new failure modes.\n\n**In practice:**\n\
  - Run `specsmith stress-test` after every batch of new requirements\n- Resolve critical\
  \ failure modes before adding more requirements\n- A passing `specsmith epistemic-audit`\
  \ with equilibrium=YES is the milestone gate\n\n**Current status:**\nRun `specsmith\
  \ epistemic-audit` to check current equilibrium status.\n\n---\n\n## Certainty Threshold\n\
  \nThe project's certainty threshold is configured in `scaffold.yml` (`epistemic_threshold`).\n\
  Default: **0.70**\n\nArtifacts below this threshold in ACCEPTED or higher status\
  \ are tracked in\n`docs/governance/uncertainty-map.md` and flagged in epistemic\
  \ audit reports.\n\n---\n\n## Belief Artifact Lifecycle\n\n```text\nDRAFT → ACCEPTED\
  \ → STRESS_TESTED → RECONSTRUCTED\n                                         ↓\n\
  \                                     DEPRECATED\n```\n\nHard rules:\n- No belief\
  \ advances to ACCEPTED without human review\n- No belief is deleted — only DEPRECATED\n\
  - No recovery is applied without human approval (H2)\n- Beliefs with P1 priority\
  \ and confidence below MEDIUM are a stop condition (H13)\n"
